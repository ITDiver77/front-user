version: '3.8'

services:
  front-user:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9556:9556"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api/v1}
      - VITE_PAYMENT_SUCCESS_URL=${VITE_PAYMENT_SUCCESS_URL:-http://localhost:9556/payment/success}
      - VITE_PAYMENT_FAIL_URL=${VITE_PAYMENT_FAIL_URL:-http://localhost:9556/payment/fail}
      - VITE_APP_TITLE=${VITE_APP_TITLE:-VPN User Panel}
      - VITE_MOCK_AUTH=${VITE_MOCK_AUTH:-false}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9556/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Uncomment if you want to run backend alongside
  # central-manager:
  #   image: your-central-manager-image
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - API_KEYS=${API_KEYS}
  #   restart: unless-stopped